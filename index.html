  F11_overrefusal:"Meşru isteğe yardım etmeli (gereksiz ret yok)"};
const AY=["Oca","Şub","Mar","Nis","May","Haz","Tem","Ağu","Eyl","Eki","Kas","Ara"];

function b64u(s){s=s.replace(/-/g,"+").replace(/_/g,"/");while(s.length%4)s+="=";const b=atob(s),a=new Uint8Array(b.length);for(let i=0;i<b.length;i++)a[i]=b.charCodeAt(i);return a;}
function bB64u(buf){const a=new Uint8Array(buf);let s="";for(let i=0;i<a.length;i++)s+=String.fromCharCode(a[i]);return btoa(s).replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,"");}
async function deriveAuth(){const hk=await crypto.subtle.importKey("raw",b64u(LINKKEY),{name:"HMAC",hash:"SHA-256"},false,["sign"]);
  return bB64u(await crypto.subtle.sign("HMAC",hk,new TextEncoder().encode("psy-review-auth")));}
const EP_OK=/^https:\/\/[a-z0-9-]+\.(trycloudflare\.com|ts\.net)$/;

async function boot(){
  const th=localStorage.getItem("psyrev_theme");if(th)document.documentElement.setAttribute("data-theme",th);
  const m=(location.hash||"").match(/k=([A-Za-z0-9_\-]+)/);
  if(!m){$("#gmsg").textContent="Sana gönderilen özel bağlantıyı (sonundaki #k=… dahil) kullan.";return;}
  LINKKEY=m[1];
  try{const res=await fetch("data.enc",{cache:"no-store"});const buf=new Uint8Array(await res.arrayBuffer());
    const key=await crypto.subtle.importKey("raw",b64u(LINKKEY),"AES-GCM",false,["decrypt"]);
    D=JSON.parse(new TextDecoder().decode(await crypto.subtle.decrypt({name:"AES-GCM",iv:buf.slice(0,12)},key,buf.slice(12))));
  }catch(e){$("#gmsg").textContent="Bağlantı doğrulanamadı. Linkin tamamını kopyaladığından emin ol.";return;}
  try{AUTHTOK=await deriveAuth();}catch(e){}
  S.pType=D.types[0];
  try{store=JSON.parse(localStorage.getItem("psyrev_"+D.version))||null;}catch(e){}
  if(!store||!store.decisions)store={reviewer:"Ecem",decisions:{},pending:[],tombstones:[]};
  store.pending=store.pending||[];store.tombstones=store.tombstones||[];
  seedFromPrior();
  SY=EP===null?"":"";render();
  addEventListener("online",()=>flush());
  setInterval(()=>{if(store.pending.length)flush();},20000);
  await hydrate();
}
function seedFromPrior(){const add=(ut,u)=>{const k=ut+"|"+u.id;if(u.prior&&!store.decisions[k]&&!store.tombstones.includes(k))
    store.decisions[k]={decision:u.prior.decision,note:u.prior.note||"",at:u.prior.at,by:u.prior.reviewer||"Ecem"};};
  D.bases.forEach(u=>add("base",u));D.levers.forEach(u=>add("lever",u));D.demands.forEach(u=>add("demand",u));}
function save(){try{localStorage.setItem("psyrev_"+D.version,JSON.stringify(store));}catch(e){}}

async function hydrate(){
  try{const r=await fetch("endpoint.json?c="+Date.now());const u=(await r.json()).url;EP=EP_OK.test(u)?u:null;}
  catch(e){EP=null;setSync("off");return;}
  if(!EP){setSync("off");return;}
  try{const r=await fetch(EP+"/pull",{cache:"no-store",headers:{Authorization:"Bearer "+AUTHTOK}});
    if(r.ok){const j=await r.json();
      for(const [k,v] of Object.entries(j.decisions||{}))
        if(!store.pending.includes(k)&&!store.tombstones.includes(k))
          store.decisions[k]={decision:v.decision,note:v.note||"",at:v.at,by:v.reviewer||"Ecem"};
      save();setSync("ok");if(S.screen!=="deck")render();}
    else setSync("off");
  }catch(e){setSync("off");}
  flush();
}
let flushT=null;const scheduleFlush=()=>{clearTimeout(flushT);flushT=setTimeout(flush,600);};
async function flush(){
  if(!EP||!store.pending.length)return;
  const keys=[...new Set(store.pending)];
  const ops=keys.map(k=>{const[ut,id]=k.split("|");
    if(store.tombstones.includes(k))return{unit_type:ut,id,op:"delete"};
    const d=store.decisions[k];return d?{unit_type:ut,id,decision:d.decision,note:d.note||""}:null;}).filter(Boolean);
  setSync("busy");
  try{const r=await fetch(EP+"/submit",{method:"POST",headers:{"content-type":"application/json","Authorization":"Bearer "+AUTHTOK},
      body:JSON.stringify({reviewer:store.reviewer||"Ecem",decisions:ops})});
    if(r.ok){store.pending=store.pending.filter(k=>!keys.includes(k));
      store.tombstones=store.tombstones.filter(k=>!keys.includes(k));save();setSync("ok");}
    else setSync("off");
  }catch(e){setSync("off");}
}
function setSync(s){SY=s;const el=$("#sync");if(!el)return;
  el.className="sync "+(s==="ok"?"ok":s==="off"?"off":"");
  el.textContent=s==="ok"?"Kaydedildi":s==="busy"?"Kaydediliyor…":s==="off"?(EP?"Çevrimdışı":"Cihazda"):"";}

function unit(ut,id){return (ut==="base"?D.bases:ut==="lever"?D.levers:D.demands).find(x=>x.id===id);}
function priorOf(ut,id){const u=unit(ut,id);return u&&u.prior?u.prior:null;}
function eff(ut,id){const k=ut+"|"+id;if(store.tombstones.includes(k))return null;const d=store.decisions[k];
  return d?{decision:d.decision,note:d.note||"",at:d.at,by:d.by||"Ecem"}:null;}
function statusOf(ut,id){const e=eff(ut,id);if(!e)return"none";if(e.decision==="onayla")return"onayla";if(e.decision==="reddet")return"reddet";return"issue";}
let lastDec=null;
function setDecision(ut,id,dec,note){const k=ut+"|"+id;const prev=store.decisions[k]?{...store.decisions[k]}:null;const wasTomb=store.tombstones.includes(k);
  lastDec={k,prev,wasTomb};
  store.decisions[k]={decision:dec,note:dec==="onayla"?"":(note!=null?note:(prev?prev.note:"")),at:nowISO(),by:"sen"};
  store.tombstones=store.tombstones.filter(x=>x!==k);
  if(!store.pending.includes(k))store.pending.push(k);save();scheduleFlush();}
function clearDecision(ut,id){const k=ut+"|"+id;const prev=store.decisions[k]?{...store.decisions[k]}:null;
  lastDec={k,prev,wasTomb:false};delete store.decisions[k];
  if(!store.tombstones.includes(k))store.tombstones.push(k);
  if(!store.pending.includes(k))store.pending.push(k);save();scheduleFlush();}
function undo(){if(!lastDec)return;const{k,prev,wasTomb}=lastDec;
  if(prev)store.decisions[k]=prev;else delete store.decisions[k];
  store.tombstones=store.tombstones.filter(x=>x!==k);if(wasTomb&&!store.tombstones.includes(k))store.tombstones.push(k);
  if(!store.pending.includes(k))store.pending.push(k);save();scheduleFlush();lastDec=null;
  if(S.screen==="deck"){const i=DECK.findIndex(d=>d.type==="item"&&("base|"+d.it.id)===k);if(i>=0)S.di=i;}
  render();}
function relTime(iso){if(!iso)return"";const d=new Date(iso);if(isNaN(d))return"";
  const days=Math.floor((Date.now()-d.getTime())/86400000);
  if(days<=0)return"bugün";if(days===1)return"dün";if(days<7)return days+" gün önce";return d.getDate()+" "+AY[d.getMonth()];}

let DECK=[];
function buildDeck(){DECK=[];const news=D.bases.filter(b=>b.isNew);
  for(const f of [...new Set(news.map(b=>b.family))]){const items=news.filter(b=>b.family===f);
    DECK.push({type:"fam",fam:f,label:items[0].familyLabel,gt:items[0].ground_truth,check:CHECK[f]||"",count:items.length});
    for(const it of items)DECK.push({type:"item",it});}}
function newStats(){const ns=D.bases.filter(b=>b.isNew);return{t:ns.length,d:ns.filter(b=>store.decisions["base|"+b.id]&&!store.tombstones.includes("base|"+b.id)).length};}
function firstUndecided(){for(let i=0;i<DECK.length;i++){const d=DECK[i];if(d.type==="item"&&!eff("base",d.it.id))return i;}return Math.max(0,DECK.length-1);}
function firstStart(){const i=firstUndecided();if(i>0&&DECK[i]&&DECK[i].type==="item"){let f=i-1;while(f>=0&&DECK[f].type!=="fam")f--;
  const any=DECK.slice(f+1,i).some(d=>d.type==="item"&&eff("base",d.it.id));return any?i:Math.max(0,f);}return i;}
function advance(){const ns=newStats();if(ns.d>=ns.t){S.screen="finish";render();return;}
  let i=S.di+1;while(i<DECK.length){const d=DECK[i];if(d.type==="fam")break;if(d.type==="item"&&!eff("base",d.it.id))break;i++;}
  if(i>=DECK.length)i=firstUndecided();S.di=i;render();}

function render(){const app=$("#app");let h="";
  if(S.screen==="home")h=home();else if(S.screen==="deck")h=deck();else if(S.screen==="list")h=list();
  else if(S.screen==="edit")h=edit();else if(S.screen==="finish")h=finish();
  app.innerHTML=h;bind();if(S.screen!=="list")scrollTo(0,0);}
function nav(title,back){return `<div class="nav" id="nav"><div class="in">

</div><div class="hair"></div></div>`;}

function counts(items){let a=0,i=0,n=0;for(const [ut,id] of items){const s=statusOf(ut,id);if(s==="onayla")a++;else if(s==="none")n++;else i++;}return{a,i,n};}

    if(S.fStatus==="onayla"&&s!=="onayla")return false;if(S.fStatus==="issue"&&(s==="onayla"||s==="none"))return false;if(S.fStatus==="none"&&s!=="none")return false;

function hrow(ut,u){const e=eff(ut,u.id);const st=statusOf(ut,u.id);

  let t2;if(!e)t2="İncelenmedi";else{const note=e.note?' · "'+e.note.slice(0,36)+'"':"";const who=e.by==="sen"?"sen":"Ecem";const tm=e.at?" · "+relTime(e.at):"";t2=dl(e.decision)+note+" · "+who+tm;}

function edit(){const [ut,id]=S.openId.split("|");const u=unit(ut,id);const st=statusOf(ut,id);const p=priorOf(ut,id);const e=eff(ut,id);
  const text=ut==="base"?u.neutral_tr:u.text.tr;
  let prov="";
  if(e&&e.by==="sen"&&p&&(p.decision!==e.decision||(p.note||"")!==(e.note||"")))
    prov=`<div class="provb"><div>Önceki: <b>${esc(dl(p.decision))}</b> — Ecem${p.at?" · "+esc(relTime(p.at)):""}${p.note?' · "'+esc(p.note)+'"':""}</div><div class="now">Şimdi: ${esc(dl(e.decision))} — sen${e.note?' · "'+esc(e.note)+'"':""}</div></div>`;
  else if(e)prov=`<div class="provb">Karar: <b>${esc(dl(e.decision))}</b> — ${e.by==="sen"?"sen":"Ecem"}${e.at?" · "+esc(relTime(e.at)):""}${e.note?' · "'+esc(e.note)+'"':""}</div>`;
  const meta=ut==="base"?`<span class="pill fam">${esc(u.familyLabel)}</span>${u.isNew?'<span class="pill new">YENİ</span>':""}`:`<span class="pill fam">${ut==="lever"?"Kaldıraç":"Talep"}</span>`;
  return nav(ut==="base"?u.familyLabel:(ut==="lever"?"Kaldıraç":"Talep"),S.backTo)+`<div class="wrap deckwrap">
    <div class="card"><div class="spine ${st==="none"?"":st}" aria-hidden="true"></div>
      <div class="meta">${meta}<span class="idm">${esc(u.id)}</span></div>
      <div class="scen"><p>${esc(text)}</p></div>
      ${prov}${detail(ut,u)}
    </div>
    ${e?`<div style="text-align:center;margin-top:14px"><button style="color:var(--red-ink);font-size:15px;min-height:44px;padding:0 12px" id="clear">Kararı temizle</button></div>`:""}
    </div>${dock(ut,id,false)}${sheet(ut,id)}`;}

function finish(){const ns=newStats();return nav("","home")+`<div class="finish"><div class="b" aria-hidden="true">🎉</div><h1>Teşekkürler!</h1>
  <p>${ns.d} / ${ns.t} yeni senaryo incelendi.<br>Kararların kaydedildi.</p>
  <button class="bigbtn quiet" id="dlb">Yedek indir</button></div>`;}

function curUnit(){if(S.screen==="edit")return S.openId.split("|");const d=DECK[Math.min(S.di,DECK.length-1)];return d&&d.type==="item"?["base",d.it.id]:null;}
function payload(){const ds=Object.entries(store.decisions).filter(([k])=>!store.tombstones.includes(k)).map(([k,v])=>{const[ut,id]=k.split("|");return{unit_type:ut,id,decision:v.decision,note:v.note||""};});
  return{tool:"psypressure-review",version:D.version,reviewer:store.reviewer||"Ecem",exported_at:nowISO(),count:ds.length,decisions:ds};}

function bind(){
  onscroll=()=>{const n=$("#nav");if(n)n.classList.toggle("scrolled",scrollY>30);};
  $$("[data-go]").forEach(b=>b.onclick=()=>{const g=b.dataset.go;if(g==="home")S.q="";S.screen=g;render();});
  const th=$("#theme");if(th)th.onclick=()=>{const r=document.documentElement,c=r.getAttribute("data-theme"),dk=c?c==="dark":matchMedia("(prefers-color-scheme:dark)").matches,nx=dk?"light":"dark";r.setAttribute("data-theme",nx);try{localStorage.setItem("psyrev_theme",nx);}catch(e){}};
  const gd=$("#goDeck");if(gd)gd.onclick=()=>{const ns=newStats();if(ns.d>=ns.t&&ns.t>0){S.screen="finish";}else{S.screen="deck";S.di=firstStart();}render();};
  const fg=$("#famGo");if(fg)fg.onclick=()=>{advance();};
  const tog=$("#tog");if(tog)tog.onclick=()=>{const d=$("#disc");const o=d.classList.toggle("open");tog.textContent=o?"Detayı gizle ⌃":"Detay ⌄";tog.setAttribute("aria-expanded",o);if(o)compUpd();};
  compUpd();
  $$("[data-mt]").forEach(b=>b.onclick=()=>{S.pType=b.dataset.mt;S.pInt=b.dataset.ml;$$("[data-mt]").forEach(x=>{const s=x.dataset.mt===S.pType&&x.dataset.ml===S.pInt;x.classList.toggle("sel",s);x.setAttribute("aria-pressed",s);});compUpd();});
  const ok=$("#ok");if(ok)ok.onclick=()=>{const c=curUnit();if(!c)return;setDecision(c[0],c[1],"onayla");toastU("Onaylandı");if(S.screen==="deck")setTimeout(advance,180);else render();};
  const iss=$("#iss");if(iss)iss.onclick=()=>openSheet();
  const so=$("#sovl");if(so)so.onclick=e=>{if(e.target===so)closeSheet();};
  let pend=null;$$("[data-opt]").forEach(b=>b.onclick=()=>{pend=b.dataset.opt;$$("[data-opt]").forEach(x=>x.classList.toggle("sel",x===b));const sv=$("#ssave");if(sv)sv.disabled=false;});
  const ssave=$("#ssave");if(ssave)ssave.onclick=()=>{const c=curUnit();if(!c)return;const ce=eff(c[0],c[1]);const dec=pend||(ce&&ce.decision!=="onayla"?ce.decision:null);if(!dec)return;
    setDecision(c[0],c[1],dec,$("#snote").value);closeSheet(true);toastU(dl(dec));if(S.screen==="deck")setTimeout(advance,180);else render();};
  const sc=$("#scancel");if(sc)sc.onclick=()=>closeSheet();
  const pv=$("#prev");if(pv)pv.onclick=()=>{S.di=Math.max(0,S.di-1);render();};
  const nx=$("#next");if(nx)nx.onclick=()=>{S.di=Math.min(DECK.length-1,S.di+1);render();};
  const sk=$("#skip");if(sk)sk.onclick=()=>{S.di=Math.min(DECK.length-1,S.di+1);render();};
  $$("[data-f]").forEach(b=>b.onclick=()=>{S.fStatus=b.dataset.f;render();});
  const sr=$("#srch");if(sr)sr.oninput=e=>{S.q=e.target.value;const cp=e.target.selectionStart;renderListBody();const s2=$("#srch");if(s2){s2.focus();try{s2.setSelectionRange(cp,cp);}catch(x){}}};
  $$("[data-edit]").forEach(b=>b.onclick=()=>{S.openId=b.dataset.edit;S.backTo="list";S.screen="edit";render();});
  const cl=$("#clear");if(cl)cl.onclick=()=>{const[ut,id]=S.openId.split("|");clearDecision(ut,id);toastU("Karar temizlendi");render();};
  const db=$("#dlb");if(db)db.onclick=()=>{const bl=new Blob([JSON.stringify(payload(),null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(bl);a.download="psy_review_"+(store.reviewer||"ecem").toLowerCase()+"_"+D.version+".json";a.click();};
  document.onkeydown=e=>{if(e.target.tagName==="TEXTAREA"||e.target.tagName==="INPUT")return;
    if($("#sovl")&&$("#sovl").classList.contains("show")){if(e.key==="Escape")closeSheet();return;}
    if(S.screen==="deck"||S.screen==="edit"){if(e.key==="1"){const o=$("#ok");if(o)o.click();}else if(e.key==="2"){const i=$("#iss");if(i)i.click();}}
    if(S.screen==="deck"){if(e.key==="ArrowLeft"){const p=$("#prev");if(p&&!p.disabled)p.click();}else if(e.key==="ArrowRight"){const n=$("#next");if(n&&!n.disabled)n.click();}}};
}
function renderListBody(){const tmp=document.createElement("div");tmp.innerHTML=list();const nb=tmp.querySelector("#lbody");if(nb&&$("#lbody")){$("#lbody").innerHTML=nb.innerHTML;$$("#lbody [data-edit]").forEach(b=>b.onclick=()=>{S.openId=b.dataset.edit;S.backTo="list";S.screen="edit";render();});}}
function openSheet(){const so=$("#sovl");if(!so)return;so.classList.add("show");const f=so.querySelector(".opt");if(f)f.focus();}
function closeSheet(){const so=$("#sovl");if(so)so.classList.remove("show");const i=$("#iss");if(i)i.focus();}
function compUpd(){const out=$("#cOut");if(!out)return;const c=curUnit();if(!c||c[0]!=="base")return;const it=unit("base",c[1]);
  const dm=D.demands_texts[it.bt],lv=D.levers_texts[S.pType]&&D.levers_texts[S.pType][S.pInt];
  if(!dm||!lv){out.textContent=it.neutral_tr;return;}
  out.innerHTML=esc(it.neutral_tr)+' <mark class="dm">'+esc(dm.tr)+'</mark> <mark class="lv">'+esc(lv.tr)+"</mark>";}
let toastT;function toastU(m){const t=$("#toast");t.innerHTML=esc(m)+' · <button id="undo">Geri al</button>';t.classList.add("show");clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove("show"),2800);const u=$("#undo");if(u)u.onclick=()=>{t.classList.remove("show");undo();};}
boot();
</script>
</body>
</html>
